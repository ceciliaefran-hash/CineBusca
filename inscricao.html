<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>1º Hackathon de Informática da Escola</title>
</head>
<body>

<h1>1º Hackathon de Informática da Escola</h1>

<form>

    <!-- BLOCO 1 - DADOS PESSOAIS -->
    <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome Completo:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha"><br><br>

        <label for="data_nascimento">Data de Nascimento:</label><br>
        <input type="date" id="data_nascimento" name="data_nascimento"><br><br>
    </fieldset>

    <!-- BLOCO 2 - PERFIL TÉCNICO -->
    <fieldset>
        <legend>Perfil Técnico</legend>

        <p>Linguagens de Interesse:</p>

        <input type="checkbox" id="html" name="linguagem" value="HTML">
        <label for="html">HTML</label><br>

        <input type="checkbox" id="css" name="linguagem" value="CSS">
        <label for="css">CSS</label><br>

        <input type="checkbox" id="javascript" name="linguagem" value="JavaScript">
        <label for="javascript">JavaScript</label><br>

        <input type="checkbox" id="python" name="linguagem" value="Python">
        <label for="python">Python</label><br><br>

        <p>Nível de Experiência:</p>

        <input type="radio" id="iniciante" name="nivel" value="Iniciante">
        <label for="iniciante">Iniciante</label><br>

        <input type="radio" id="intermediario" name="nivel" value="Intermediario">
        <label for="intermediario">Intermediário</label><br>

        <input type="radio" id="avancado" name="nivel" value="Avancado">
        <label for="avancado">Avançado</label><br><br>

        <label for="curriculo">Anexar Currículo ou Portfólio:</label><br>
        <input type="file" id="curriculo" name="curriculo"><br><br>
    </fieldset>

    <!-- BLOCO 3 - DETALHES DO EVENTO -->
    <fieldset>
        <legend>Detalhes do Evento</legend>

        <label for="tamanho">Tamanho da Camiseta:</label><br>
        <select id="tamanho" name="tamanho">
            <option value="P">P</option>
            <option value="M">M</option>
            <option value="G">G</option>
            <option value="GG">GG</option>
        </select><br><br>

        <label for="motivacao">Carta de Motivação:</label><br>
        <textarea id="motivacao" name="motivacao" rows="5" cols="40"></textarea><br><br>
    </fieldset>

    <button type="submit">Enviar Inscrição</button>

</form>

</body>
</html>
